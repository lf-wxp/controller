  "controller-test-check",
  # 5. 协议 crate 单元测试 + proptest
  "protocol-test",
  # 6. 通信 crate 集成测试（loopback feature）
  "comm-test",
  # 7. Example 单元测试（防止 controller.md / receiver.md 示例代码腐化 + 验证 comm 引入即用体验）
  "example-host-demo-test",
  "example-receiver-demo-test",
  "example-comm-hello-world-test",
]

# ------------------------------------------------------------
# 生产 CI：release-ready 门禁（在标准 ci 基础上追加）
# ------------------------------------------------------------
# 相对 `cargo make ci`：多跑一次 protocol crate 的生产 build 门禁，
# 验证真实密钥能编译、弱密钥 fallback 已被关闭。
#
# 使用：
# ```bash
# CONTROLLER_SECRET_V1=<32B> CONTROLLER_SECRET_V2=<32B> cargo make ci-release
# ```
[tasks.ci-release]
description = "生产 CI 流程（在 `ci` 基础上追加 protocol 生产 build 门禁）"
category = "Aggregate"
dependencies = [
  "ci",
  "protocol-production-check",
]

