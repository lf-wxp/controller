category = "Clean"
dependencies = ["clean-workspace", "dashboard-clean"]

[tasks.clean-workspace]
description = "清理 cargo target 目录"
category = "Clean"
command = "cargo"
args = ["clean"]

# ============================================================
# c6 接收端固件（ESP32-C6，riscv32imac-unknown-none-elf）
# ============================================================
# 与 controller（ESP32 xtensa）是兄弟 receiver：c6 常驻监听手柄 ESP-NOW 广播，
# 解码后在 ST7789 LCD 上渲染状态。其专用 toolchain（nightly + riscv）与
# target 配置都在 crates/c6/.cargo/config.toml 与 crates/c6/rust-toolchain.toml，
# 下面的任务通过 cwd = "crates/c6" 进入该目录自动套用。
# 日志走 panic-rtt-target + RTT（需 probe-rs / JTAG），不用 espflash defmt。
[tasks.c6-check]
description = "c6 接收端固件 cargo check（riscv32imac-unknown-none-elf）"
category = "C6"
cwd = "crates/c6"
command = "cargo"
args = ["check", "--lib", "--bins"]

[tasks.c6-clippy]
description = "c6 接收端固件 cargo clippy 严格模式（riscv32imac-unknown-none-elf）"
category = "C6"
cwd = "crates/c6"
command = "cargo"
args = ["clippy", "--lib", "--bins", "--", "-D", "warnings"]

[tasks.c6-build]
description = "c6 接收端固件 cargo build（release 需加 --release）"
category = "C6"
cwd = "crates/c6"
command = "cargo"
args = ["build", "--bin", "c6"]

[tasks.c6-build-release]
description = "c6 接收端固件 release 构建"
category = "C6"
cwd = "crates/c6"
command = "cargo"
args = ["build", "--bin", "c6", "--release"]

[tasks.c6-run]
description = "c6 通过 probe-rs 烧录并运行（带 RTT 日志，需要 JTAG 调试探针）"
category = "C6"
cwd = "crates/c6"
command = "cargo"
args = ["run", "--bin", "c6", "--release"]

[tasks.c6-flash]
description = "c6 通过 espflash 串口烧录（release，自动先 build，无需 JTAG）"
category = "C6"
dependencies = ["c6-build-release"]
command = "espflash"
args = ["flash", "--chip", "esp32c6", "../../target/riscv32imac-unknown-none-elf/release/c6"]

[tasks.c6-monitor]
description = "c6 通过 espflash 监听串口（RTT 需 probe-rs，此命令仅串口裸 monitor）"
category = "C6"
command = "espflash"
args = ["monitor", "--chip", "esp32c6"]

[tasks.c6-test-check]
description = "c6 embedded-test harness 静态检查（不真机运行）"
category = "C6"
cwd = "crates/c6"
command = "cargo"
args = ["check", "--tests"]
