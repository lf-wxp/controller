# ============================================================
# 格式化（三 crate 共用 rustfmt.toml）
# ============================================================

[tasks.fmt]
description = "自动格式化全部 crate 源码"
category = "Format"
dependencies = [
  "fmt-controller",
  "fmt-protocol",
