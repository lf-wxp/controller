# ============================================================
# controller —— cargo-make 顶层任务编排（Makefile.toml）
# ============================================================
#
# 本文件是 workspace 级的构建统一入口。安装 `cargo-make` 之后，所有
# 常用构建/测试/CI 流程都通过 `cargo make <task>` 调用，屏蔽三个 crate
# 各自不同的 target / toolchain / 参数。
#
# ## 首次安装
# ```bash
# cargo install cargo-make
# ```
#
# ## 常用任务
# ```bash
# cargo make quick             # 快速本地校验（controller check + clippy）
# cargo make check-all         # 三 crate 全部 cargo check
# cargo make clippy-all        # 三 crate 全部 cargo clippy 严格模式
# cargo make test              # 协议 crate 单元测试 + proptest（host target）
# cargo make ci                # 完整 CI 流程（本地跑通 = CI 跑通）
#
# cargo make controller-build  # 手柄固件构建
# cargo make c6-build  # C6固件构建
# cargo make controller-run    # 串口烧录 + 实时日志（espflash，无需 JTAG 探针）
# cargo make c6-run    # C6 烧录 + probe-rs 实时日志建
# cargo make dashboard-serve   # Dashboard 开发服务器（trunk serve --open）
# cargo make dashboard-build   # Dashboard 生产构建（trunk build --release）
# ```
#
# ## 查看所有任务
# ```bash
# cargo make --list-all-steps
# ```

# ============================================================
# 全局配置
# ============================================================
[config]
# 关闭 cargo-make 内置的默认任务（audit / outdated / build-doc 等），
# 我们完全自主定义任务集，避免污染 --list-all-steps 输出
skip_core_tasks = true
# 不自动在 workspace 成员上传播根任务 —— 我们的三个 crate 有不同
# target/toolchain，必须显式管理，不能"一键 cargo build 广播"
default_to_workspace = false
# 关闭在每个任务前打印时间戳（保持输出干净）
reduce_output = false

[env]
# Host target —— 供协议 crate 单元测试指定
# Apple Silicon = aarch64-apple-darwin
# Intel Mac    = x86_64-apple-darwin
# Linux        = x86_64-unknown-linux-gnu
# 使用 cargo-make 内置变量自动检测
HOST_TARGET = "${CARGO_MAKE_RUST_TARGET_TRIPLE}"

# 串口烧录端口 ESP_PORT：不在此写死。controller-flash / controller-monitor /
# controller-run 三个任务会在自己的脚本里解析：
#   1) 若你导出了 ESP_PORT（`ESP_PORT=/dev/cu.usbserial-xxx cargo make controller-run`）则用它；
#   2) 否则自动挑第一个常见 USB-UART 设备（macOS cu.* / Linux ttyUSB*、ttyACM*）；
#   3) 仍解析不到则不带 --port，交给 espflash 自身探测（仅一个串口直接用、多个则交互选择）。
# 想确认当前端口：`ls /dev/cu.usbserial* /dev/cu.wchusbserial* 2>/dev/null`。
#
# 备注：ESP_PORT 故意**不**声明成 cargo-make [env] 变量——脚本内引用 $ESP_PORT 会被
# cargo-make 判为自引用环境变量循环（E001）。直接从进程环境读即可。

# ============================================================
# 默认任务（cargo make 无参数）
# ============================================================
[tasks.default]
description = "打印帮助信息（列出所有任务）"
category = "General"
alias = "help"

[tasks.help]
description = "列出所有可用任务及说明"
category = "General"
script = '''
echo ""
echo "🎮 controller —— cargo-make 任务列表"
echo ""
echo "常用："
echo "  cargo make quick             快速本地校验（手柄 check + clippy）"
echo "  cargo make ci                完整 CI 流程（全部 crate 检查）"
echo ""
echo "手柄固件（controller / xtensa-esp32）："
echo "  cargo make controller-check"
echo "  cargo make controller-clippy"
echo "  cargo make controller-build"
echo "  cargo make controller-run    串口烧录 + 实时日志（espflash，无需 JTAG 探针）"
echo "  cargo make controller-flash  串口烧录（espflash，无需 JTAG 探针）"
echo "  cargo make controller-monitor 串口实时日志（espflash monitor）"
echo ""
echo "协议 crate（controller-protocol / host）："
echo "  cargo make protocol-check"
echo "  cargo make protocol-clippy"
echo "  cargo make protocol-test     单元测试 + proptest"
echo ""
echo "通信 crate（comm / host，启用全部 feature）："
echo "  cargo make comm-check"
echo "  cargo make comm-clippy"
echo "  cargo make comm-test      集成测试（开启 loopback feature）"
echo ""
echo "Dashboard（controller-dashboard / wasm32）："
echo "  cargo make dashboard-check"
echo "  cargo make dashboard-clippy"
echo "  cargo make dashboard-serve   trunk serve --open"
echo "  cargo make dashboard-build   trunk build --release"
echo ""
echo "格式化："
echo "  cargo make fmt               自动格式化"
echo "  cargo make fmt-check         格式检查（CI 使用）"
echo ""
echo "聚合："
echo "  cargo make check-all         三 crate check"
echo "  cargo make clippy-all        三 crate clippy"
echo ""
echo "更多任务见 cargo make --list-all-steps"
echo ""
'''

# ============================================================
# 手柄固件（controller，xtensa-esp32-none-elf）
# ============================================================
# 固件 crate 现位于 crates/controller，其 .cargo/config.toml 配置
# target = "xtensa-esp32-none-elf"。下面的 controller-* 任务通过
# cwd = "crates/controller" 进入该目录，自动套用 xtensa target + esp fork toolchain。

[tasks.controller-check]
description = "手柄固件 cargo check（xtensa-esp32-none-elf）"
category = "Controller"
cwd = "crates/controller"
command = "cargo"
args = ["check", "--lib", "--bins"]

[tasks.controller-clippy]
description = "手柄固件 cargo clippy 严格模式"
category = "Controller"
cwd = "crates/controller"
command = "cargo"
args = ["clippy", "--lib", "--bins", "--", "-D", "warnings"]

[tasks.controller-build]
description = "手柄固件 cargo build（release 需加 --release）"
category = "Controller"
cwd = "crates/controller"
command = "cargo"
args = ["build", "--bin", "controller"]

[tasks.controller-build-release]
description = "手柄固件 release 构建（LTO + opt-level=s）"
category = "Controller"
cwd = "crates/controller"
command = "cargo"
args = ["build", "--bin", "controller", "--release"]

# controller-run：串口烧录 + 实时日志（一步到位）
#
# ⚠️ 原始 ESP32-WROOM 没有内置 USB-JTAG，仅以 USB-UART 连接，**不能用 probe-rs**
# 烧录/调试（会报 "No connected probes were found"）。因此本任务用 espflash 走串口
# `flash --monitor`：先烧录再直接进入 defmt 日志监听（用同一个 ELF 解码，无需 --elf）。
#
# 端口由 ESP_PORT 指定（默认见文件顶部 [env]）。dependencies 保证先 build，避免
# "改了源码却烧到旧固件"。probe-rs 相关流程请看 c6-run（C6 有内置 USB-Serial/JTAG）。
[tasks.controller-run]
description = "构建 + espflash 串口烧录并进入实时日志（自动探测串口，可用 ESP_PORT 覆盖）"
category = "Controller"
cwd = "crates/controller"
dependencies = ["controller-build"]
script_runner = "@shell"
script = [
  "elf=../../target/xtensa-esp32-none-elf/debug/controller",
  "port=\"${ESP_PORT:-$(ls /dev/cu.usbserial-* /dev/cu.wchusbserial-* /dev/cu.SLAB_USBtoUART* /dev/cu.usbmodem* /dev/ttyUSB* /dev/ttyACM* 2>/dev/null | head -n 1)}\"",
  "if [ -n \"$port\" ]; then",
  "  echo \"[controller-run] serial port: $port\"",
  "  espflash flash --monitor --port \"$port\" \"$elf\"",
  "else",
  "  echo \"[controller-run] no serial port resolved; letting espflash auto-detect\"",
  "  espflash flash --monitor \"$elf\"",
  "fi",
]

# 串口烧录：原始 ESP32 没有内置 USB-JTAG，仅以 USB-UART（如 /dev/cu.usbserial-*）连接，
# probe-rs 找不到探针会报 "No connected probes were found"，故一律用 espflash 串口烧录。
# 端口自动探测（见文件顶部 [env] ESP_PORT）；解析不到时把选择交给 espflash 自身。
#
# 注意：dependencies 声明确保每次烧录前都会先 `cargo build --bin controller`，
# 避免"改了源码但只跑 espflash 结果烧到旧固件"的隐蔽坑。
[tasks.controller-flash]
description = "构建 + espflash 串口烧录固件（自动探测串口，可用 ESP_PORT 覆盖）"
category = "Controller"
cwd = "crates/controller"
dependencies = ["controller-build"]
script_runner = "@shell"
script = [
  "elf=../../target/xtensa-esp32-none-elf/debug/controller",
  "port=\"${ESP_PORT:-$(ls /dev/cu.usbserial-* /dev/cu.wchusbserial-* /dev/cu.SLAB_USBtoUART* /dev/cu.usbmodem* /dev/ttyUSB* /dev/ttyACM* 2>/dev/null | head -n 1)}\"",
  "if [ -n \"$port\" ]; then",
  "  echo \"[controller-flash] serial port: $port\"",
  "  espflash flash --port \"$port\" \"$elf\"",
  "else",
  "  echo \"[controller-flash] no serial port resolved; letting espflash auto-detect\"",
  "  espflash flash \"$elf\"",
  "fi",
]

[tasks.controller-monitor]
description = "通过 espflash 监听串口 defmt 实时日志（自动探测串口，可用 ESP_PORT 覆盖）"
category = "Controller"
cwd = "crates/controller"
# --elf 让 espflash 从 ELF 的 .espressif.metadata 段读到 LOG_FORMAT="defmt-espflash"
# 并加载 defmt symbol table 解码 rzcobs 二进制日志帧。
# 依赖 controller-build 是为了保证 ELF 与实际烧录的 flash 内容一致——
# 否则源码改了但没重新 build，defmt frame index 不匹配会打印乱码。
dependencies = ["controller-build"]
script_runner = "@shell"
script = [
  "elf=../../target/xtensa-esp32-none-elf/debug/controller",
  "port=\"${ESP_PORT:-$(ls /dev/cu.usbserial-* /dev/cu.wchusbserial-* /dev/cu.SLAB_USBtoUART* /dev/cu.usbmodem* /dev/ttyUSB* /dev/ttyACM* 2>/dev/null | head -n 1)}\"",
  "if [ -n \"$port\" ]; then",
  "  espflash monitor --port \"$port\" --elf \"$elf\"",
  "else",
  "  espflash monitor --elf \"$elf\"",
  "fi",
]

[tasks.controller-test-check]
description = "手柄 embedded-test harness 静态检查（不真机运行）"
category = "Controller"
cwd = "crates/controller"
command = "cargo"
# --no-default-features：关掉 workspace feature `firmware-panic`，
# 让 embedded-test 独占 `#[panic_handler]` lang item，避免 E0152 冲突。
# 生产 firmware 编译（controller-check / controller-build 等）不加此 flag，
# 默认启用 firmware-panic → esp-backtrace 正常注册 panic handler。
args = ["check", "--tests", "--no-default-features"]

# ============================================================
# 协议 crate（controller-protocol，host target）
# ============================================================
# 子目录内有独立的 .cargo/config.toml 覆盖 xtensa 默认设置
# 通过 cwd 切换到子目录执行，让子目录 config 自动生效

[tasks.protocol-check]
description = "协议 crate cargo check（host target）"
category = "Protocol"
toolchain = "stable"
command = "cargo"
args = ["check", "--target", "${HOST_TARGET}"]
cwd = "crates/protocol"

[tasks.protocol-clippy]
description = "协议 crate cargo clippy 严格模式（host target）"
category = "Protocol"
toolchain = "stable"
command = "cargo"
args = ["clippy", "--target", "${HOST_TARGET}", "--", "-D", "warnings"]
cwd = "crates/protocol"

[tasks.protocol-test]
description = "协议 crate 单元测试 + proptest（host target，单线程）"
category = "Protocol"
toolchain = "stable"
command = "cargo"
# --test-threads=1：SESSION_NONCE 是进程全局静态，多线程互相干扰
args = [
  "test",
  "--target", "${HOST_TARGET}",
  "--",
  "--test-threads=1",
]
cwd = "crates/protocol"

# ------------------------------------------------------------
# 生产 build 门禁（release production check）
# ------------------------------------------------------------
# **目的**：验证 protocol crate 在关闭 `embed-default-secrets` +
# `debug-auth-bypass` 双 feature 时，配合环境变量注入的真实密钥仍能编译。
#
# 触发时机：
#   - 本地：`cargo make protocol-production-check`（先 export 环境变量）
#   - CI：`.github/workflows/ci.yml` 里 release job 会在 secrets 就位后运行
#
# 环境变量要求（缺失即编译失败，符合预期）：
#   CONTROLLER_SECRET_V1 = 32 字节高熵字符串
#   CONTROLLER_SECRET_V2 = 32 字节高熵字符串
[tasks.protocol-production-check]
description = "protocol crate 生产 build 门禁（禁用弱密钥 fallback + 认证后门）"
category = "Protocol"
toolchain = "stable"
command = "cargo"
args = [
  "check",
  "--target", "${HOST_TARGET}",
  "--no-default-features",
  # 允许 std / defmt / serde 由调用方按需再加 --features，但**绝不**允许
  # embed-default-secrets 与 debug-auth-bypass 进入 release 产物。
]
cwd = "crates/protocol"

# 快捷别名
[tasks.test]
description = "协议单元测试 + proptest（cargo make protocol-test 别名）"
category = "Protocol"
alias = "protocol-test"

# ============================================================
# 通信 crate（comm，host target）
# ============================================================
# comm crate 基于 embassy async + no_std，面向手柄/接收端两侧提供引入即用的
# Notifier / Receiver / 密钥环。本地 CI 跑 host target，靠 `loopback` feature
# 模拟真实 ESP-NOW 拓扑。
#
# 为什么用 --all-features：
# - `defmt` / `serde` / `loopback` 三个 feature 不互斥，且各自 gate 不同的模块；
#   如果只跑 default features，loopback.rs 里的 clippy 问题永远不会被发现
# - test 任务则只开 loopback（defmt 需要 embedded probe 不适合 host tests）

[tasks.comm-check]
description = "通信 crate cargo check（host target，--all-features）"
category = "Comm"
toolchain = "stable"
command = "cargo"
args = ["check", "--target", "${HOST_TARGET}", "--all-features"]
cwd = "crates/comm"

[tasks.comm-clippy]
description = "通信 crate cargo clippy 严格模式（host target，--all-features / --all-targets）"
category = "Comm"
toolchain = "stable"
command = "cargo"
# --all-targets 让 tests/ 目录也过 clippy；--all-features 覆盖 loopback / defmt / serde 代码路径
args = [
  "clippy",
  "--target", "${HOST_TARGET}",
  "--all-features",
  "--all-targets",
  "--",
  "-D", "warnings",
]
cwd = "crates/comm"

[tasks.comm-test]
description = "通信 crate 集成测试（host target，开启 loopback feature，单线程）"
category = "Comm"
toolchain = "stable"
command = "cargo"
# --features loopback,test-utils：集成测试依赖内存 mpsc 模拟链路（loopback）
#   且被 `#![cfg(all(feature = "loopback", feature = "test-utils"))]` 双 gate；
#   缺少 test-utils 时 tests/integration.rs 会被整体跳过（编译出 0 个用例）。
# --test-threads=1：与 protocol crate 同款可靠性保障（避免全局静态变量互干，
#   尤其是 SESSION_NONCE 这类进程级 static）
args = [
  "test",
  "--target", "${HOST_TARGET}",
  "--features", "loopback,test-utils",
  "--",
  "--test-threads=1",
]
cwd = "crates/comm"

# ============================================================
# Dashboard（controller-dashboard，wasm32-unknown-unknown）
# ============================================================
# 子目录内有独立的 .cargo/config.toml 已设置 target = "wasm32-unknown-unknown"
# 无需再显式传 --target

[tasks.dashboard-check]
description = "Dashboard cargo check（wasm32-unknown-unknown）"
category = "Dashboard"
toolchain = "stable"
command = "cargo"
args = ["check"]
cwd = "crates/dashboard"

[tasks.dashboard-clippy]
description = "Dashboard cargo clippy 严格模式"
category = "Dashboard"
toolchain = "stable"
command = "cargo"
args = ["clippy", "--bin", "controller-dashboard", "--", "-D", "warnings"]
cwd = "crates/dashboard"

[tasks.dashboard-serve]
description = "Dashboard 开发服务器（trunk serve --open，热重载）"
category = "Dashboard"
# 覆盖根目录 rust-toolchain.toml（esp）为 stable，否则 trunk 子进程会沿用 esp
# 工具链，而 esp 未安装 wasm32-unknown-unknown 的预编译 std，导致编译失败。
toolchain = "stable"
# 若未装 trunk 会自动 cargo install
install_crate = { crate_name = "trunk", binary = "trunk", test_arg = "--version" }
command = "trunk"
args = ["serve", "--open"]
cwd = "crates/dashboard"

[tasks.dashboard-build]
description = "Dashboard 生产构建（wasm-opt + LTO，输出 dist/）"
category = "Dashboard"
# 覆盖根目录 rust-toolchain.toml（esp）为 stable，否则 trunk 子进程会沿用 esp
# 工具链，而 esp 未安装 wasm32-unknown-unknown 的预编译 std，导致编译失败。
toolchain = "stable"
install_crate = { crate_name = "trunk", binary = "trunk", test_arg = "--version" }
command = "trunk"
args = ["build", "--release"]
cwd = "crates/dashboard"

[tasks.dashboard-clean]
description = "清理 Dashboard 产物目录 dist/"
category = "Dashboard"
install_crate = { crate_name = "trunk", binary = "trunk", test_arg = "--version" }
command = "trunk"
args = ["clean"]
cwd = "crates/dashboard"

